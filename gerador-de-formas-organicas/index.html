<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forma - Gerador de Formas Orgânicas</title>
  <!-- Google Fonts: Inter para interface e JetBrains Mono para código -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container">
    <!-- Seção de Visualização -->
    <section class="preview-section">
      <div id="svg-container" class="preview-container">
        <!-- SVG Gerado será inserido aqui -->
      </div>
      
      <div class="code-box">
        <code id="svg-code">
          <!-- Código SVG será exibido aqui -->
        </code>
      </div>

      <div class="actions" style="width: 100%; grid-template-columns: 1fr 1fr;">
        <button id="btn-copy" class="btn-outline">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          Copiar SVG
        </button>
        <button id="btn-download" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          Baixar .svg
        </button>
      </div>
    </section>

    <!-- Seção de Controles -->
    <section class="controls-section">
      <header>
        <h1>Forma</h1>
        <p class="subtitle">Crie formas orgânicas únicas para seus designs.</p>
      </header>

      <div class="control-group">
        <div class="control-header">
          <label for="complexity">Complexidade</label>
          <span id="val-complexity" class="value-badge">6</span>
        </div>
        <input type="range" id="complexity" min="3" max="25" value="6">
      </div>

      <div class="control-group">
        <div class="control-header">
          <label for="irregularity">Irregularidade</label>
          <span id="val-irregularity" class="value-badge">50%</span>
        </div>
        <input type="range" id="irregularity" min="0" max="1" step="0.05" value="0.5">
      </div>

      <div class="control-group">
        <div class="control-header">
          <label for="size">Tamanho da Tela</label>
          <span id="val-size" class="value-badge">500px</span>
        </div>
        <input type="range" id="size" min="200" max="800" step="10" value="500">
      </div>

      <div class="control-group">
        <div class="control-header">
          <label for="color">Cor da Forma</label>
        </div>
        <input type="color" id="color" value="#6366f1">
      </div>

      <div class="actions">
        <button id="btn-generate" class="btn-secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><polyline points="21 3 21 9 15 9"/></svg>
          Gerar Nova Forma
        </button>
      </div>
    </section>
  </div>

  <div id="toast" class="toast">Feedback aqui</div>

  <script src="script.js"></script>
</body>
</html>
